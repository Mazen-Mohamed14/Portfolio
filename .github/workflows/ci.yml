name: CI

on: 
  push:
   branches: [main]
  pull_request:
   branches: [main]

jobs: 
  build-and-test:
   runs-on: ubuntu-latest

   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install deps
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
